name: Build on develop push

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: firebase-hosting-develop
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build and Deploy (develop)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Prepare .env.develop
        run: |
          if [ -f .env.develop ]; then
            cp .env.develop .env
            echo "Using .env.develop for build"
          fi

      - name: Build
        run: npm run build
        env:
          CI: false
          VITE_BASE_URL: https://lms-api-develop-763972588311.asia-southeast1.run.app/api
          VITE_CLOUDINARY_PATH: ${{ secrets.VITE_CLOUDINARY_PATH_DEV }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LMS_APP_DEV_1F189 }}
          projectId: mediatrix-lms-app-dev
          channelId: live
