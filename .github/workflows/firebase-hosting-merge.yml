name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - test
      - dev
      - main
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_deploy_test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set environment variables
        run: |
          echo "VITE_BASE_URL=${{ secrets.VITE_BASE_URL_TEST }}" >> .env
          echo "VITE_CLOUDINARY_PATH=${{ secrets.VITE_CLOUDINARY_PATH_TEST }}" >> .env
      - name: Build
        run: npm ci && npm run build
        env:
          CI: false
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL_TEST }}
          VITE_CLOUDINARY_PATH: ${{ secrets.VITE_CLOUDINARY_PATH_TEST }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_LMS_APP_TEST_BFFD3 }}"
          channelId: live
          projectId: lms-app-test-bffd3

  build_and_deploy_dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set environment variables
        run: |
          echo "VITE_BASE_URL=${{ secrets.VITE_BASE_URL_DEV }}" >> .env
          echo "VITE_CLOUDINARY_PATH=${{ secrets.VITE_CLOUDINARY_PATH_DEV }}" >> .env
      - name: Build
        run: npm ci && npm run build
        env:
          CI: false
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL_DEV }}
          VITE_CLOUDINARY_PATH: ${{ secrets.VITE_CLOUDINARY_PATH_DEV }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_LMS_APP_DEV_1F189 }}"
          channelId: live
          projectId: mediatrix-lms-app-dev
